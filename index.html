<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Work — Рабочие инструменты</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">⚡</div>
                <span>System<span class="accent">Work</span></span>
            </div>
            
            <nav class="nav">
                <div class="nav-section">
                    <div class="nav-title">Основное</div>
                    <a class="nav-item active" data-page="dashboard">
                        <span class="nav-icon">📊</span>Обзор
                    </a>
                    <a class="nav-item" data-page="help">
                        <span class="nav-icon">❓</span>Как пользоваться
                    </a>
                </div>
                
                <div class="nav-section">
                    <div class="nav-title">Конструктор</div>
                    <a class="nav-item" data-page="constructor">
                        <span class="nav-icon">🛠️</span>Конструктор форм
                        <span class="nav-badge" id="templatesCount">0</span>
                    </a>
                    <a class="nav-item" data-page="forms">
                        <span class="nav-icon">📝</span>Мои формы
                        <span class="nav-badge" id="formsCount">0</span>
                    </a>
                </div>
                
                <div class="nav-section">
                    <div class="nav-title">Производство</div>
                    <a class="nav-item" data-page="production">
                        <span class="nav-icon">🏭</span>Цеха и склады
                    </a>
                    <a class="nav-item" data-page="kitchen">
                        <span class="nav-icon">🍽️</span>Кухня
                    </a>
                </div>
                
                <div class="nav-section">
                    <div class="nav-title">Инструменты</div>
                    <a class="nav-item" data-page="checklists">
                        <span class="nav-icon">✅</span>Чек-листы
                    </a>
                    <a class="nav-item" data-page="tools">
                        <span class="nav-icon">🔧</span>Оборудование
                    </a>
                    <a class="nav-item" data-page="charts">
                        <span class="nav-icon">📈</span>Графики
                    </a>
                </div>
                
                <div class="nav-section">
                    <div class="nav-title">Система</div>
                    <a class="nav-item" data-page="settings">
                        <span class="nav-icon">⚙️</span>Настройки
                    </a>
                </div>
            </nav>
        </aside>
        
        <main class="main" id="main">
            <!-- Content loaded dynamically -->
        </main>
    </div>

    <div class="modal" id="modal">
        <div class="modal-overlay" onclick="Modal.close(event)">
            <div class="modal-content" onclick="event.stopPropagation()">
                <div class="modal-header">
                    <h2 class="modal-title" id="modalTitle">Модальное окно</h2>
                    <button class="modal-close" onclick="Modal.close()">&times;</button>
                </div>
                <div class="modal-body" id="modalBody"></div>
                <div class="modal-footer" id="modalFooter"></div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast"></div>


    <script src="db.js"></script>
    <script src="helpers.js"></script>
    <script src="constructor.js"></script>
    <script src="checklist.js"></script>
    <script src="app.js"></script>
</body>
</html>
