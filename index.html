<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Work — Рабочие инструменты</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface2: #1c2128;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #4393e6;
            --green: #3fb950;
            --red: #f85149;
            --yellow: #d29922;
            --purple: #a371f7;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
        
        /* Layout */
        .app { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); padding: 20px; position: fixed; height: 100vh; overflow-y: auto; z-index: 10; }
        .main { flex: 1; margin-left: 260px; padding: 24px; }
        
        /* Logo */
        .logo { font-size: 20px; font-weight: 700; color: var(--accent); margin-bottom: 24px; display: flex; align-items: center; gap: 8px; }
        .logo span { color: var(--text-muted); font-weight: 400; }
        
        /* Navigation */
        .nav-section { margin-bottom: 20px; }
        .nav-label { font-size: 11px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; letter-spacing: 0.5px; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 6px; cursor: pointer; color: var(--text-muted); transition: all 0.2s; margin-bottom: 2px; }
        .nav-item:hover { background: rgba(88,166,255,0.1); color: var(--text); }
        .nav-item.active { background: rgba(88,166,255,0.15); color: var(--accent); }
        .nav-item .icon { font-size: 18px; width: 24px; text-align: center; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
        .header h1 { font-size: 24px; font-weight: 600; }
        .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        
        /* Buttons */
        .btn { padding: 10px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { border-color: var(--accent); }
        .btn-danger { background: rgba(248,81,73,0.15); color: var(--red); }
        .btn-danger:hover { background: rgba(248,81,73,0.25); }
        .btn-success { background: rgba(63,185,80,0.15); color: var(--green); }
        .btn-success:hover { background: rgba(63,185,80,0.25); }
        .btn-sm { padding: 6px 12px; font-size: 13px; }
        .btn-icon { padding: 8px; }
        
        /* Cards */
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
        .card-title { font-size: 16px; font-weight: 600; }
        .card-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
        
        /* Stats */
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
        .stat-value { font-size: 28px; font-weight: 700; }
        .stat-label { font-size: 13px; color: var(--text-muted); }
        .stat-card.accent { border-color: var(--accent); background: rgba(88,166,255,0.05); }
        
        /* Tables */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--text-muted); font-weight: 500; font-size: 12px; text-transform: uppercase; }
        tr:hover { background: rgba(255,255,255,0.02); }
        
        /* Forms */
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
        .form-input { width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 14px; }
        .form-input:focus { outline: none; border-color: var(--accent); }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
        .form-hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        
        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-overlay.show { display: flex; }
        .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
        .modal-lg { max-width: 900px; }
        .modal-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-title { font-size: 18px; font-weight: 600; }
        .modal-close { background: none; border: none; color: var(--text-muted); font-size: 24px; cursor: pointer; padding: 0; line-height: 1; }
        .modal-close:hover { color: var(--text); }
        .modal-body { padding: 20px; }
        .modal-footer { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
        
        /* Badges */
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
        .badge-ok { background: rgba(63,185,80,0.15); color: var(--green); }
        .badge-warn { background: rgba(210,153,34,0.15); color: var(--yellow); }
        .badge-error { background: rgba(248,81,73,0.15); color: var(--red); }
        .badge-info { background: rgba(88,166,255,0.15); color: var(--accent); }
        
        /* Empty state */
        .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-icon { font-size: 48px; margin-bottom: 16px; }
        
        /* Toast */
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 2000; }
        .toast { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; margin-top: 8px; animation: slideIn 0.3s ease; max-width: 300px; }
        .toast-success { border-left: 3px solid var(--green); }
        .toast-error { border-left: 3px solid var(--red); }
        .toast-info { border-left: 3px solid var(--accent); }
        
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        /* Grid cards */
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .grid-cards-2 { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 16px; }
        
        /* Tool card */
        .tool-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; cursor: pointer; transition: all 0.2s; }
        .tool-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .tool-card-icon { font-size: 32px; margin-bottom: 12px; }
        .tool-card-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .tool-card-desc { font-size: 13px; color: var(--text-muted); }
        
        /* Constructor */
        .constructor-field { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
        .constructor-field:hover { border-color: var(--accent); }
        .constructor-field .drag { color: var(--text-muted); cursor: grab; }
        .constructor-field input { flex: 1; background: transparent; border: none; color: var(--text); font-size: 14px; }
        .constructor-field input:focus { outline: none; }
        .field-type { padding: 4px 8px; background: var(--surface); border-radius: 4px; font-size: 12px; color: var(--text-muted); }
        
        /* Chart container */
        .chart-container { height: 300px; background: var(--bg); border-radius: 8px; padding: 16px; margin-top: 16px; }
        .chart-placeholder { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); }
        
        /* Guide */
        .guide-step { display: flex; gap: 16px; padding: 16px; background: var(--bg); border-radius: 8px; margin-bottom: 12px; }
        .guide-step-num { width: 32px; height: 32px; background: var(--accent); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; flex-shrink: 0; }
        .guide-step-content h4 { margin-bottom: 4px; }
        .guide-step-content p { font-size: 14px; color: var(--text-muted); }
        
        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; }
            .grid-cards { grid-template-columns: 1fr; }
            .grid-cards-2 { grid-template-columns: 1fr; }
        }
        
        /* Quick actions */
        .quick-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .quick-action { padding: 8px 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
        .quick-action:hover { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="logo">⚡ System<span>Work</span></div>
            
            <nav>
                <div class="nav-section">
                    <div class="nav-label">Основное</div>
                    <div class="nav-item active" data-page="dashboard"><span class="icon">🏠</span>Главная</div>
                    <div class="nav-item" data-page="guide"><span class="icon">❓</span>Как пользоваться</div>
                </div>
                
                <div class="nav-section">
                    <div class="nav-label">Инструменты</div>
                    <div class="nav-item" data-page="journals"><span class="icon">📋</span>Журналы</div>
                    <div class="nav-item" data-page="checklists"><span class="icon">✅</span>Чек-листы</div>
                    <div class="nav-item" data-page="constructor"><span class="icon">🔧</span>Конструктор</div>
                    <div class="nav-item" data-page="charts"><span class="icon">📈</span>Графики</div>
                </div>
                
                <div class="nav-section">
                    <div class="nav-label">Объекты</div>
                    <div class="nav-item" data-page="production"><span class="icon">🏭</span>Производство</div>
                    <div class="nav-item" data-page="kitchen"><span class="icon">🍽️</span>Кухня</div>
                    <div class="nav-item" data-page="equipment"><span class="icon">🔌</span>Оборудование</div>
                </div>
                
                <div class="nav-section">
                    <div class="nav-label">Система</div>
                    <div class="nav-item" data-page="settings"><span class="icon">⚙️</span>Настройки</div>
                </div>
            </nav>
        </aside>
        
        <main class="main" id="mainContent"></main>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal" id="modalDialog">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle">Модальное окно</span>
                <button class="modal-close" onclick="App.closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="db.js"></script>
    <script src="charts.js"></script>
    <script src="app.js"></script>
</body>
</html>
