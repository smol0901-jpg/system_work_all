<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Work — Рабочие инструменты</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --green: #3fb950;
            --red: #f85149;
            --yellow: #d29922;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
        
        .app { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); padding: 20px; position: fixed; height: 100vh; overflow-y: auto; }
        .main { flex: 1; margin-left: 260px; padding: 24px; }
        
        .logo { font-size: 18px; font-weight: 700; color: var(--accent); margin-bottom: 24px; display: flex; align-items: center; gap: 8px; }
        .logo span { color: var(--text-muted); font-weight: 400; }
        
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 6px; cursor: pointer; color: var(--text-muted); transition: all 0.2s; margin-bottom: 4px; }
        .nav-item:hover { background: rgba(88,166,255,0.1); color: var(--text); }
        .nav-item.active { background: rgba(88,166,255,0.15); color: var(--accent); }
        .nav-item .icon { font-size: 18px; width: 24px; text-align: center; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .header h1 { font-size: 24px; font-weight: 600; }
        .header-actions { display: flex; gap: 8px; }
        
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: #4393e6; }
        .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { border-color: var(--accent); }
        .btn-danger { background: rgba(248,81,73,0.15); color: var(--red); }
        .btn-danger:hover { background: rgba(248,81,73,0.25); }
        
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .card-title { font-size: 16px; font-weight: 600; }
        
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--text-muted); font-weight: 500; font-size: 12px; text-transform: uppercase; }
        tr:hover { background: rgba(255,255,255,0.02); }
        
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
        .form-input { width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 14px; }
        .form-input:focus { outline: none; border-color: var(--accent); }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-overlay.show { display: flex; }
        .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        .modal-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-title { font-size: 18px; font-weight: 600; }
        .modal-close { background: none; border: none; color: var(--text-muted); font-size: 24px; cursor: pointer; }
        .modal-body { padding: 20px; }
        .modal-footer { padding: 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
        
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
        .stat-value { font-size: 28px; font-weight: 700; }
        .stat-label { font-size: 13px; color: var(--text-muted); }
        
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
        .badge-ok { background: rgba(63,185,80,0.15); color: var(--green); }
        .badge-warn { background: rgba(210,153,34,0.15); color: var(--yellow); }
        .badge-error { background: rgba(248,81,73,0.15); color: var(--red); }
        
        .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-icon { font-size: 48px; margin-bottom: 16px; }
        
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 2000; }
        .toast { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; margin-top: 8px; animation: slideIn 0.3s ease; }
        .toast-success { border-left: 3px solid var(--green); }
        .toast-error { border-left: 3px solid var(--red); }
        
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; }
        }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="logo">⚡ System<span>Work</span></div>
            <nav>
                <div class="nav-item active" data-page="dashboard"><span class="icon">📊</span>Обзор</div>
                <div class="nav-item" data-page="journals"><span class="icon">📋</span>Журналы</div>
                <div class="nav-item" data-page="production"><span class="icon">🏭</span>Производство</div>
                <div class="nav-item" data-page="kitchen"><span class="icon">🍽️</span>Кухня</div>
                <div class="nav-item" data-page="tools"><span class="icon">🔧</span>Инструменты</div>
                <div class="nav-item" data-page="settings"><span class="icon">⚙️</span>Настройки</div>
            </nav>
        </aside>
        
        <main class="main" id="mainContent"></main>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle">Модальное окно</span>
                <button class="modal-close" onclick="App.closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="db.js"></script>
    <script src="checklist.js"></script>
    <script src="app.js"></script>
</body>
</html>
